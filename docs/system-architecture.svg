<!-- System Architecture Diagram — EHealth Decentralized Identity -->
<!-- Save as docs/system-architecture.svg and open in any browser -->
<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16A34A"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">
    Decentralized Identity Management — E-Health System Architecture
  </text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#64748B">
    Sepolia Testnet · Solidity ^0.8.20 · OpenZeppelin AccessControl + ReentrancyGuard
  </text>

  <!-- ── LAYER: Users ── -->
  <text x="20" y="110" font-size="11" fill="#94A3B8" font-weight="bold">ACTORS</text>
  <line x1="20" y1="115" x2="200" y2="115" stroke="#CBD5E1" stroke-width="1"/>

  <!-- Patient -->
  <rect x="20" y="125" width="140" height="80" rx="10" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="90" y="150" text-anchor="middle" font-size="22">🏥</text>
  <text x="90" y="172" text-anchor="middle" font-size="13" font-weight="bold" fill="#1D4ED8">Patient</text>
  <text x="90" y="188" text-anchor="middle" font-size="10" fill="#3B82F6">MetaMask Wallet</text>
  <text x="90" y="200" text-anchor="middle" font-size="10" fill="#3B82F6">EOA Address</text>

  <!-- Hospital/Verifier -->
  <rect x="20" y="235" width="140" height="80" rx="10" fill="#D1FAE5" stroke="#16A34A" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="90" y="260" text-anchor="middle" font-size="22">🔬</text>
  <text x="90" y="282" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803D">Hospital / Clinic</text>
  <text x="90" y="297" text-anchor="middle" font-size="10" fill="#16A34A">VERIFIER_ROLE</text>
  <text x="90" y="309" text-anchor="middle" font-size="10" fill="#16A34A">Trusted Institution</text>

  <!-- Admin -->
  <rect x="20" y="345" width="140" height="80" rx="10" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="90" y="370" text-anchor="middle" font-size="22">🔐</text>
  <text x="90" y="392" text-anchor="middle" font-size="13" font-weight="bold" fill="#B45309">Admin / Deployer</text>
  <text x="90" y="407" text-anchor="middle" font-size="10" fill="#D97706">ADMIN_ROLE</text>
  <text x="90" y="419" text-anchor="middle" font-size="10" fill="#D97706">Manages Verifiers</text>

  <!-- ── LAYER: Frontend ── -->
  <text x="230" y="110" font-size="11" fill="#94A3B8" font-weight="bold">FRONTEND (Team B)</text>
  <line x1="230" y1="115" x2="430" y2="115" stroke="#CBD5E1" stroke-width="1"/>

  <rect x="240" y="125" width="170" height="300" rx="10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="325" y="155" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E293B">React UI / HTML</text>
  <text x="325" y="172" text-anchor="middle" font-size="11" fill="#64748B">MetaMask Integration</text>

  <rect x="255" y="185" width="140" height="30" rx="5" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="325" y="205" text-anchor="middle" font-size="11" fill="#1D4ED8">Register Identity</text>

  <rect x="255" y="225" width="140" height="30" rx="5" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="1"/>
  <text x="325" y="245" text-anchor="middle" font-size="11" fill="#15803D">View / Update Record</text>

  <rect x="255" y="265" width="140" height="30" rx="5" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="325" y="285" text-anchor="middle" font-size="11" fill="#B45309">Verify Patient</text>

  <rect x="255" y="305" width="140" height="30" rx="5" fill="#FCE7F3" stroke="#F9A8D4" stroke-width="1"/>
  <text x="325" y="325" text-anchor="middle" font-size="11" fill="#9D174D">Issue Credential</text>

  <rect x="255" y="345" width="140" height="30" rx="5" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
  <text x="325" y="365" text-anchor="middle" font-size="11" fill="#6D28D9">Wrong Network Alert</text>

  <text x="325" y="400" text-anchor="middle" font-size="10" fill="#94A3B8">Uses ABI JSON + ethers.js</text>
  <text x="325" y="415" text-anchor="middle" font-size="10" fill="#94A3B8">to call contract functions</text>

  <!-- ── LAYER: Blockchain ── -->
  <text x="460" y="110" font-size="11" fill="#94A3B8" font-weight="bold">SMART CONTRACT (Team A)</text>
  <line x1="460" y1="115" x2="700" y2="115" stroke="#CBD5E1" stroke-width="1"/>

  <rect x="460" y="125" width="240" height="320" rx="10" fill="#1E1B4B" stroke="#4338CA" stroke-width="2" filter="url(#shadow)"/>
  <text x="580" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="#E0E7FF">EHealthIdentity.sol</text>
  <text x="580" y="172" text-anchor="middle" font-size="10" fill="#818CF8">Sepolia Testnet · 0x...</text>

  <!-- Security badges -->
  <rect x="472" y="183" width="105" height="22" rx="4" fill="#312E81"/>
  <text x="524" y="198" text-anchor="middle" font-size="10" fill="#A5B4FC">🔒 AccessControl</text>

  <rect x="585" y="183" width="105" height="22" rx="4" fill="#312E81"/>
  <text x="637" y="198" text-anchor="middle" font-size="10" fill="#A5B4FC">🛡 ReentrancyGuard</text>

  <!-- Functions list -->
  <text x="480" y="228" font-size="11" fill="#C7D2FE" font-weight="bold">Patient Functions:</text>
  <text x="480" y="246" font-size="10" fill="#93C5FD">• registerIdentity(did, hash, name, blood)</text>
  <text x="480" y="262" font-size="10" fill="#93C5FD">• updateDataHash(newHash)</text>
  <text x="480" y="278" font-size="10" fill="#93C5FD">• deactivateIdentity()</text>

  <text x="480" y="302" font-size="11" fill="#C7D2FE" font-weight="bold">Verifier Functions:</text>
  <text x="480" y="320" font-size="10" fill="#6EE7B7">• verifyIdentity(patientAddress)</text>
  <text x="480" y="336" font-size="10" fill="#6EE7B7">• issueCredential(patient, type, hash, exp)</text>

  <text x="480" y="360" font-size="11" fill="#C7D2FE" font-weight="bold">Admin Functions:</text>
  <text x="480" y="378" font-size="10" fill="#FCD34D">• grantVerifier(address)</text>
  <text x="480" y="394" font-size="10" fill="#FCD34D">• revokeVerifier(address)</text>

  <text x="480" y="418" font-size="11" fill="#C7D2FE" font-weight="bold">View Functions:</text>
  <text x="480" y="432" font-size="10" fill="#D1D5DB">• getIdentity / getCredentials / resolveDID</text>

  <!-- ── LAYER: Storage ── -->
  <text x="730" y="110" font-size="11" fill="#94A3B8" font-weight="bold">STORAGE</text>
  <line x1="730" y1="115" x2="880" y2="115" stroke="#CBD5E1" stroke-width="1"/>

  <!-- On-chain -->
  <rect x="730" y="125" width="150" height="130" rx="10" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="805" y="150" text-anchor="middle" font-size="13" font-weight="bold" fill="#9A3412">On-Chain</text>
  <text x="805" y="168" text-anchor="middle" font-size="10" fill="#C2410C">(Ethereum State)</text>
  <text x="745" y="190" font-size="10" fill="#7C2D12">• PatientIdentity struct</text>
  <text x="745" y="207" font-size="10" fill="#7C2D12">• HealthCredential[]</text>
  <text x="745" y="224" font-size="10" fill="#7C2D12">• DID → Address map</text>
  <text x="745" y="241" font-size="10" fill="#7C2D12">• Role mappings</text>

  <!-- Off-chain -->
  <rect x="730" y="270" width="150" height="100" rx="10" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="805" y="295" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803D">Off-Chain</text>
  <text x="805" y="312" text-anchor="middle" font-size="10" fill="#16A34A">(IPFS / Encrypted)</text>
  <text x="745" y="330" font-size="10" fill="#166534">• Medical records</text>
  <text x="745" y="347" font-size="10" fill="#166534">• Credential docs</text>
  <text x="745" y="362" font-size="10" fill="#166534">• Hash stored on-chain</text>

  <!-- ── ARROWS ── -->
  <!-- Patient → Frontend -->
  <line x1="160" y1="165" x2="238" y2="230" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-blue)" stroke-dasharray="5,3"/>

  <!-- Hospital → Frontend -->
  <line x1="160" y1="275" x2="238" y2="290" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arrow-green)" stroke-dasharray="5,3"/>

  <!-- Admin → Frontend -->
  <line x1="160" y1="385" x2="238" y2="350" stroke="#D97706" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5,3"/>

  <!-- Frontend → Contract -->
  <line x1="410" y1="275" x2="458" y2="275" stroke="#4338CA" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="432" y="268" text-anchor="middle" font-size="9" fill="#4338CA">ethers.js</text>
  <text x="432" y="280" text-anchor="middle" font-size="9" fill="#4338CA">+ ABI</text>

  <!-- Contract → On-Chain -->
  <line x1="700" y1="230" x2="728" y2="200" stroke="#EA580C" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Contract → Off-chain hash -->
  <line x1="700" y1="300" x2="728" y2="315" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arrow-green)" stroke-dasharray="4,3"/>

  <!-- ── Legend ── -->
  <rect x="20" y="480" width="860" height="120" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="40" y="502" font-size="12" font-weight="bold" fill="#334155">Security Patterns Implemented:</text>

  <rect x="40" y="515" width="12" height="12" rx="2" fill="#312E81"/>
  <text x="58" y="526" font-size="11" fill="#1E293B">AccessControl (OpenZeppelin):</text>
  <text x="58" y="541" font-size="10" fill="#64748B">Three-tier role system — DEFAULT_ADMIN_ROLE → ADMIN_ROLE → VERIFIER_ROLE. Each function gated by role.</text>

  <rect x="40" y="555" width="12" height="12" rx="2" fill="#065F46"/>
  <text x="58" y="566" font-size="11" fill="#1E293B">ReentrancyGuard (OpenZeppelin):</text>
  <text x="58" y="581" font-size="10" fill="#64748B">nonReentrant modifier on all state-changing functions prevents re-entrancy attacks.</text>

  <rect x="460" y="515" width="12" height="12" rx="2" fill="#7C3AED"/>
  <text x="478" y="526" font-size="11" fill="#1E293B">Checks-Effects-Interactions Pattern:</text>
  <text x="478" y="541" font-size="10" fill="#64748B">All functions validate inputs first (CHECKS), update state (EFFECTS), then emit events (INTERACTIONS).</text>

  <rect x="460" y="555" width="12" height="12" rx="2" fill="#B45309"/>
  <text x="478" y="566" font-size="11" fill="#1E293B">Custom Errors + Struct Packing:</text>
  <text x="478" y="581" font-size="10" fill="#64748B">Custom errors save gas vs require strings. bool+uint64+uint64 packed into 1 storage slot saves ~40k gas per registration.</text>
</svg>
